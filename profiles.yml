ecommerce_project:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('DBT_GCP_PROJECT') }}"
      dataset: ecommerce_project
      location: US
      keyfile: "{{ env_var('DBT_KEYFILE_PATH') }}"
      threads: 4
      timeout_seconds: 300
      priority: interactive
